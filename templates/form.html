<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Input Details | Breast Cancer Prediction System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#ff758c 0%,#ff7eb3 100%);
min-height:100vh;
}

.fade-in{
animation:fadeIn 1s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.hover-zoom:hover{
transform:scale(1.03);
transition:0.3s;
}

.card{
border-radius:15px;
}

.section-title{
font-weight:700;
color:#dc3545;
margin-top:20px;
}

</style>

</head>

<body class="d-flex align-items-center">

<div class="container py-5">

<div class="card shadow-lg border-0 fade-in mx-auto" style="max-width:1100px;">

<div class="card-body p-5">

<h2 class="text-center text-danger fw-bold mb-2">
Breast Cancer Diagnostic Input
</h2>

<p class="text-center text-muted mb-4">
Enter the tumor diagnostic measurements to predict whether the tumor is <b>Benign</b> or <b>Malignant</b>.
</p>

<form action="{{ url_for('predict')}}" method="POST" class="row g-4">

<h5 class="section-title">Mean Features</h5>

<div class="col-md-4">
<label class="form-label">Radius Mean</label>
<input type="number" step="0.001" name="radius_mean" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Texture Mean</label>
<input type="number" step="0.001" name="texture_mean" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Perimeter Mean</label>
<input type="number" step="0.001" name="perimeter_mean" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Area Mean</label>
<input type="number" step="0.001" name="area_mean" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Smoothness Mean</label>
<input type="number" step="0.0001" name="smoothness_mean" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Compactness Mean</label>
<input type="number" step="0.0001" name="compactness_mean" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Concavity Mean</label>
<input type="number" step="0.0001" name="concavity_mean" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Concave Points Mean</label>
<input type="number" step="0.0001" name="concave_points_mean" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Symmetry Mean</label>
<input type="number" step="0.0001" name="symmetry_mean" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Fractal Dimension Mean</label>
<input type="number" step="0.0001" name="fractal_dimension_mean" class="form-control" required>
</div>

<h5 class="section-title">Standard Error Features</h5>

<div class="col-md-4">
<label class="form-label">Radius SE</label>
<input type="number" step="0.001" name="radius_se" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Texture SE</label>
<input type="number" step="0.001" name="texture_se" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Perimeter SE</label>
<input type="number" step="0.001" name="perimeter_se" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Area SE</label>
<input type="number" step="0.001" name="area_se" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Smoothness SE</label>
<input type="number" step="0.0001" name="smoothness_se" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Compactness SE</label>
<input type="number" step="0.0001" name="compactness_se" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Concavity SE</label>
<input type="number" step="0.0001" name="concavity_se" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Concave Points SE</label>
<input type="number" step="0.0001" name="concave_points_se" class="form-control" required>

<div class="col-md-4">

<input type="number" step="0.0001" name="symmetry_se" class="form-control" required>

<div class="col-md-4">
<label class="form-label">Fractal Dimension SE</label>
<input type="number" step="0.0001" name="fractal_dimension_se" class="form-control" required>
</div>

<h5 class="section-title">Worst Features</h5>

<div class="col-md-4">
<label class="form-label">Radius Worst</label>
<input type="number" step="0.001" name="radius_worst" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Texture Worst</label>
<input type="number" step="0.001" name="texture_worst" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Perimeter Worst</label>
<input type="number" step="0.001" name="perimeter_worst" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Area Worst</label>
<input type="number" step="0.001" name="area_worst" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Smoothness Worst</label>
<input type="number" step="0.0001" name="smoothness_worst" class="form-control" required>

<div class="col-md-4">
<label class="form-label">Concavity Worst</label>
<input type="number" step="0.0001" name="concavity_worst" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Concave Points Worst</label>
<input type="number" step="0.0001" name="concave_points_worst" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Symmetry Worst</label>
<input type="number" step="0.0001" name="symmetry_worst" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Fractal Dimension Worst</label>
<input type="number" step="0.0001" name="fractal_dimension_worst" class="form-control" required>
</div>

<div class="text-center mt-5">

<button type="submit" class="btn btn-lg btn-danger shadow-lg hover-zoom px-5">
🔬 Predict Tumor Diagnosis
</button>

</div>

</form>

<div class="text-center mt-4">

<a href="{{ url_for('homepage') }}" class="text-decoration-none text-light small">
← Back to Welcome Page
</a>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
